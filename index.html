<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbered Sequence Minigame</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            /* Themeable colors */
            --primary-color: #caa02be8;
            --secondary-color: #1a8c6f;
            --success-color: #2dd4a8;
            --failure-color: #ff4444;
            --warning-color: #fbbf24;
            --background-color: #1e1e1e;
            --background-gradient-1: #0f1e2d;
            --background-gradient-2: #1e3c5a;
            --background-secondary: #001428;
            --background-tertiary: #002038;
            --border-color: #505050;
            --text-color: #e0e0e0;
            --text-secondary-color: #969696;
            --danger-color: #cc0000;
            --safe-color: #22c55e;
            --background-opacity: 0.95;
            --background-gradient-1-alpha: rgba(20, 16, 3, 0.95);
            --background-gradient-2-alpha: rgba(19, 15, 3, 0.95);
            --background-secondary-alpha: rgba(0, 0, 0, 0.9);
            --background-tertiary-alpha: rgba(35, 28, 10, 0.95);
            
            /* Legacy variables for compatibility */
            --neon-blue: var(--primary-color);
            --light-blue: var(--primary-color);
            --dark-blue: var(--background-gradient-1);
            --dark-bg: var(--background-gradient-1);
            --safe-zone: var(--safe-color);
            --glow: rgba(204, 164, 59, 0.4);
            --glow-color: var(--primary-color);
            --background: var(--background-color);
            --text: var(--text-color);
        }

        html, body {
            background: #0a1118 !important;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- LOCK SCREEN CORES --- */
        #main-wrapper {
            filter: blur(20px); 
            transition: filter 0.5s ease;
            pointer-events: none; 
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lock-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .lock-icon {
            font-size: 80px;
            color: #ffcc44;
            text-shadow: 0 0 20px rgba(204, 164, 59, 0.4);
            animation: pulse 2s infinite ease-in-out;
            cursor: default;
        }

        #device-id-display {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            color: #ffcc44;
            opacity: 0.7;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Game Container Layout Base */
        .game-container {
            background: linear-gradient(135deg, var(--background-gradient-1-alpha) 0%, var(--background-gradient-2-alpha) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            width: 650px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }

        .hack-title h2 {
            margin-top: 0;
            color: #fff;
            font-size: 24px;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 0 10px var(--glow);
        }

        .blink {
            animation: titleBlink 1.5s infinite;
            color: var(--warning-color);
        }

        .hack-info {
            margin: 15px 0;
            text-align: center;
            color: var(--text-color);
        }

        .counter {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .message {
            font-size: 15px;
            color: var(--text-secondary-color);
            min-height: 20px;
        }

        /* Separated Timer Containers */
        .timer-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            padding: 4px;
            margin-bottom: 8px;
            position: relative;
        }

        .timer-text-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            padding: 6px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .timer-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .timer-text {
            text-align: center;
            font-size: 14px;
            color: #fff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Numbered Sequence Custom Styles */
        .numbered-sequence-display {
            position: relative;
            height: 500px;
            background: linear-gradient(135deg, var(--background-gradient-1-alpha) 0%, var(--background-gradient-2-alpha) 100%);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .numbered-sequence-splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--light-blue);
        }

        .numbered-sequence-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: iconFloat 2s ease-in-out infinite;
        }

        .numbered-sequence-text {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--light-blue);
            text-shadow: 0 0 10px var(--glow);
        }

        .numbered-sequence-grid {
            display: grid;
            gap: 8px;
        }

        .numbered-sequence-square {
            background: rgba(0, 40, 80, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            color: var(--light-blue);
            text-shadow: 0 0 10px var(--glow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .numbered-sequence-square::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .numbered-sequence-square:hover::before {
            transform: translateX(100%);
        }

        .numbered-sequence-square:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 60, 120, 0.5);
            transform: scale(1.02);
        }

        .numbered-sequence-square.lit {
            background: linear-gradient(135deg, var(--light-blue), var(--neon-blue));
            border-color: white;
            box-shadow: 0 0 20px var(--glow);
            color: white;
        }

        .numbered-sequence-square.selected {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--light-blue);
            box-shadow: 0 0 10px var(--glow);
            transform: scale(0.95);
        }

        .numbered-sequence-square.correct {
            background: linear-gradient(135deg, var(--success-color), var(--safe-color)) !important;
            border-color: var(--success-color);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.7) !important;
            animation: numberedCorrectPulse 0.6s ease-in-out;
            color: white !important;
        }

        .numbered-sequence-square.wrong {
            background: linear-gradient(135deg, var(--failure-color), var(--danger-color)) !important;
            border-color: var(--failure-color);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.7) !important;
            animation: numberedWrongShake 0.6s ease-in-out;
            color: white !important;
        }

        .numbered-sequence-timer-progress {
            height: 100%;
            background: linear-gradient(to right, var(--light-blue), var(--neon-blue));
            width: 100%;
            transition: width 0.1s linear;
            border-radius: 3px;
            box-shadow: 0 0 10px var(--glow);
        }

        /* Settings Interface Layout Panels */
        .settings-panel-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            color: var(--text-color);
        }

        .settings-panel-container h3 {
            margin-top: 0;
            color: var(--primary-color);
            letter-spacing: 2px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
        }

        .setting-group label {
            font-size: 12px;
            color: var(--text-secondary-color);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        .setting-value {
            color: var(--warning-color);
            font-weight: bold;
        }

        .setting-group select {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            padding: 8px;
            color: #fff;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
        }

        .setting-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px var(--glow);
        }

        /* --- STYLED RANGE INPUT FIELDS (PERFECT CIRCLES) --- */
        .setting-group input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            margin: 12px 0;
            cursor: pointer;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .setting-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary-color);
            border: 1px solid #fff;
            box-shadow: 0 0 8px var(--glow);
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.1s ease;
        }

        .setting-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #fff;
        }

        .setting-group input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary-color);
            border: 1px solid #fff;
            box-shadow: 0 0 8px var(--glow);
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.1s ease;
        }

        .setting-group input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
            background: #fff;
        }

        .settings-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .btn-save {
            background: var(--primary-color);
            color: #000;
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        /* Animations */
        @keyframes titleBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes numberedCorrectPulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 0, 0.7); }
            50% { transform: scale(1.15); box-shadow: 0 0 40px rgba(0, 255, 0, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 0, 0.7); }
        }
        @keyframes numberedWrongShake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
            100% { transform: translateX(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 40px #ffcc44; }
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-icon">🔒</div>
        <div id="device-id-display">Connecting...</div>
    </div>

    <div id="main-wrapper">
        <div id="numbered-sequence-container" class="game-container">
            
            <div class="settings-panel-container" id="settings-panel">
                <h3>SYSTEM CONFIGURATION</h3>
                <div class="settings-grid">
                    <div class="setting-group">
                        <label>Grid Dimension <span class="setting-value" id="val-grid-size">7</span></label>
                        <input type="range" id="setting-grid-size" min="3" max="10" value="7">
                    </div>
                    <div class="setting-group">
                        <label>Sequence Length <span class="setting-value" id="val-seq-len">8</span></label>
                        <input type="range" id="setting-seq-len" min="3" max="15" value="8">
                    </div>
                    <div class="setting-group">
                        <label>Total Rounds <span class="setting-value" id="val-rounds">3</span></label>
                        <input type="range" id="setting-rounds" min="1" max="10" value="3">
                    </div>
                    <div class="setting-group">
                        <label>Max Allowed Mistakes <span class="setting-value" id="val-max-wrong">1</span></label>
                        <input type="range" id="setting-max-wrong" min="1" max="5" value="1">
                    </div>
                    <div class="setting-group">
                        <label>Memorize Time (sec) <span class="setting-value" id="val-show-time">3</span></label>
                        <input type="range" id="setting-show-time" min="1" max="20" value="3" step="0.5">
                    </div>
                    <div class="setting-group">
                        <label>Input Limit Time (sec) <span class="setting-value" id="val-guess-time">7</span></label>
                        <input type="range" id="setting-guess-time" min="3" max="30" value="7">
                    </div>
                </div>
                <div class="settings-actions">
                    <button class="action-btn btn-save" id="save-settings-btn">START</button>
                </div>
            </div>

            <div class="minigame-gameplay-elements" style="display: none; flex-direction: column; width: 100%;">
                
                <div class="numbered-sequence-display">
                    <div class="numbered-sequence-splash">
                        <div class="numbered-sequence-icon">🔢</div>
                        <span class="numbered-sequence-text">PREPARING NUMBERED MATRIX...</span>
                    </div>
                    <div class="numbered-sequence-grid"></div>
                </div>

                <div class="hack-info">
                    <div class="counter">ROUND: <span id="numbered-sequence-round-current">1</span>/<span id="numbered-sequence-round-total">3</span></div>
                    <div class="message"><span id="numbered-sequence-message">Memorize the numbered sequence</span></div>
                </div>
                
                <div class="timer-container">
                    <div class="timer-bar">
                        <div class="numbered-sequence-timer-progress"></div>
                    </div>
                </div>

                <div class="timer-text-container">
                    <div class="timer-text">Time: <span id="numbered-sequence-timer">4.0</span>s</div>
                </div>
            </div>
        </div>
    </div>

    <div class="audio-elements" style="display: none;">
        <audio id="sound-click" src="click.mp3" preload="auto"></audio>
        <audio id="sound-success" src="success.mp3" preload="auto"></audio>
        <audio id="sound-failure" src="failure.mp3" preload="auto"></audio>
        <audio id="sound-penalty" src="penalty.mp3" preload="auto"></audio>
        <audio id="sound-buttonPress" src="buttonPress.mp3" preload="auto"></audio>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://hxzwvyovetiwmykeiznk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh4end2eW92ZXRpd215a2Vpem5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODk1NDgsImV4cCI6MjA5MzU2NTU0OH0.jc4FiiHncItST_nlKkVpEb0V-aYLePCzy357aMMcbzE';
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function checkApproval() {
            let deviceId = localStorage.getItem('user_name');
            
            if (!deviceId) {
                deviceId = 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('user_name', deviceId);
            }

            $('#device-id-display').text('DEVICE ID: ' + deviceId);

            const { data, error } = await supabase
                .from('requests')
                .select('status')
                .eq('name', deviceId)
                .single();

            if (!data) {
                await supabase.from('requests').insert([{ name: deviceId, status: 'pending', minigame: 'Numbered Sequence Minigame' }]);
                lockSite();
            } else if (data.status === 'approved') {
                unlockSite();
            } else {
                lockSite();
            }

            setTimeout(checkApproval, 3000); 
        }

        function unlockSite() {
            $('#lock-screen').fadeOut();
            $('#main-wrapper').css({
                'filter': 'none',
                'pointer-events': 'auto'
            });
        }

        function lockSite() {
            if ($('#lock-screen').is(':hidden')) {
                $('#lock-screen').fadeIn();
                $('#main-wrapper').css({
                    'filter': 'blur(20px)',
                    'pointer-events': 'none'
                });
                
                // Safety hook to stop sequence logic if user is suddenly unapproved
                if (typeof numberedSequenceGameState !== 'undefined' && numberedSequenceGameState.gameStarted) {
                    endNumberedSequenceGame(false);
                }
            }
        }

        $(document).ready(() => {
            checkApproval();
        });
    </script>

    <script>
        // --- GAME SYSTEM DATA CONFIGURATION MATRIX ---
        const numberedSequenceGameState = {
            config: {
                gridSize: 4, 
                sequenceLength: 6,
                rounds: 3,
                showTime: 4000,
                guessTime: 10000,
                maxWrongPresses: 3
            },
            currentRound: 0,
            wrongPresses: 0,
            gameStarted: false,
            gameActive: false,
            showingPattern: false,
            numberedSquares: [],
            playerSequence: [],
            currentExpectedNumber: 1,
            timerInterval: null,
            showTimer: null,
            guessTimer: null,
            activeTimerDuration: 4000
        };

        // --- GAME CONTROL MODULE CORES ---
        function startNumberedSequenceGame(config = {}) {
            if (typeof $ === 'undefined') {
                console.error('jQuery is not available!');
                return;
            }
            
            clearAllGameTimers();
            
            // Apply configurations
            numberedSequenceGameState.config = { ...numberedSequenceGameState.config, ...config };
            numberedSequenceGameState.currentRound = 0;
            numberedSequenceGameState.wrongPresses = 0;
            numberedSequenceGameState.gameStarted = false;
            numberedSequenceGameState.gameActive = false;
            numberedSequenceGameState.showingPattern = false;
            numberedSequenceGameState.numberedSquares = [];
            numberedSequenceGameState.playerSequence = [];
            numberedSequenceGameState.currentExpectedNumber = 1;
            
            $('.numbered-sequence-grid').hide();
            $('.numbered-sequence-splash').show();
            
            updateNumberedSequenceUI();
            
            // Execute automated startup sequences
            setTimeout(() => {
                $('.numbered-sequence-splash').fadeOut(400, () => {
                    initializeNumberedSequenceGrid();
                    $('.numbered-sequence-grid').fadeIn(400, () => {
                        startNumberedSequenceRound();
                    });
                });
            }, 3000);
        }

        function clearAllGameTimers() {
            if (numberedSequenceGameState.timerInterval) {
                clearInterval(numberedSequenceGameState.timerInterval);
                numberedSequenceGameState.timerInterval = null;
            }
            if (numberedSequenceGameState.showTimer) {
                clearTimeout(numberedSequenceGameState.showTimer);
                numberedSequenceGameState.showTimer = null;
            }
            if (numberedSequenceGameState.guessTimer) {
                clearTimeout(numberedSequenceGameState.guessTimer);
                numberedSequenceGameState.guessTimer = null;
            }
        }

        function updateNumberedSequenceUI() {
            $('#numbered-sequence-round-current').text(numberedSequenceGameState.currentRound + 1);
            $('#numbered-sequence-round-total').text(numberedSequenceGameState.config.rounds);
            $('#numbered-sequence-message').text(`Round ${numberedSequenceGameState.currentRound + 1} - Wrong presses this round: ${numberedSequenceGameState.wrongPresses}/${numberedSequenceGameState.config.maxWrongPresses}`);
        }

        function initializeNumberedSequenceGrid() {
            const gridContainer = $('.numbered-sequence-grid');
            gridContainer.empty();
            
            const gridSize = numberedSequenceGameState.config.gridSize;
            gridContainer.css({
                'display': 'grid',
                'grid-template-columns': `repeat(${gridSize}, 1fr)`,
                'grid-template-rows': `repeat(${gridSize}, 1fr)`,
                'gap': '8px',
                'width': '420px',
                'height': '420px',
                'margin': '0 auto'
            });
            
            for (let i = 0; i < gridSize * gridSize; i++) {
                const square = $('<div>')
                    .addClass('numbered-sequence-square')
                    .attr('data-index', i)
                    .on('click', handleNumberedSequenceSquareClick);
                
                gridContainer.append(square);
            }
            
            numberedSequenceGameState.gameStarted = true;
        }

        function startNumberedSequenceRound() {
            if (!numberedSequenceGameState.gameStarted) {
                return;
            }
            
            numberedSequenceGameState.showingPattern = true;
            numberedSequenceGameState.gameActive = false;
            numberedSequenceGameState.playerSequence = [];
            numberedSequenceGameState.currentExpectedNumber = 1;
            numberedSequenceGameState.wrongPresses = 0;
            
            $('.numbered-sequence-square').removeClass('lit selected correct wrong').text('');
            
            generateNumberedSequence();
            displayNumberedPattern();
            updateNumberedSequenceUI();
            $('#numbered-sequence-message').text('Memorize the numbered sequence');
            
            let remainingTime = numberedSequenceGameState.config.showTime;
            numberedSequenceGameState.activeTimerDuration = numberedSequenceGameState.config.showTime;
            updateNumberedSequenceTimer(remainingTime);
            
            numberedSequenceGameState.showTimer = setTimeout(() => {
                hideNumbersStartGame();
            }, numberedSequenceGameState.config.showTime);
            
            numberedSequenceGameState.timerInterval = setInterval(() => {
                remainingTime -= 100;
                if (remainingTime < 0) remainingTime = 0;
                updateNumberedSequenceTimer(remainingTime);
                if (remainingTime <= 0) {
                    clearInterval(numberedSequenceGameState.timerInterval);
                    numberedSequenceGameState.timerInterval = null;
                }
            }, 100);
        }

        function restartCurrentRound() {
            if (!numberedSequenceGameState.gameStarted) {
                return;
            }
            
            numberedSequenceGameState.showingPattern = true;
            numberedSequenceGameState.gameActive = false;
            numberedSequenceGameState.playerSequence = [];
            numberedSequenceGameState.currentExpectedNumber = 1;
            
            $('.numbered-sequence-square').removeClass('selected correct wrong');
            displayNumberedPattern();
            updateNumberedSequenceUI();
            $('#numbered-sequence-message').text('Memorize the numbered sequence');
            
            let remainingTime = numberedSequenceGameState.config.showTime;
            numberedSequenceGameState.activeTimerDuration = numberedSequenceGameState.config.showTime;
            updateNumberedSequenceTimer(remainingTime);
            
            numberedSequenceGameState.showTimer = setTimeout(() => {
                hideNumbersStartGame();
            }, numberedSequenceGameState.config.showTime);
            
            numberedSequenceGameState.timerInterval = setInterval(() => {
                remainingTime -= 100;
                if (remainingTime < 0) remainingTime = 0;
                updateNumberedSequenceTimer(remainingTime);
                if (remainingTime <= 0) {
                    clearInterval(numberedSequenceGameState.timerInterval);
                    numberedSequenceGameState.timerInterval = null;
                }
            }, 100);
        }

        function generateNumberedSequence() {
            const totalSquares = numberedSequenceGameState.config.gridSize * numberedSequenceGameState.config.gridSize;
            const sequenceLength = Math.min(numberedSequenceGameState.config.sequenceLength, totalSquares);
            
            numberedSequenceGameState.numberedSquares = [];
            const availableIndices = Array.from({length: totalSquares}, (_, i) => i);
            
            for (let i = 1; i <= sequenceLength; i++) {
                const randomIndex = Math.floor(Math.random() * availableIndices.length);
                const squareIndex = availableIndices.splice(randomIndex, 1)[0];
                
                numberedSequenceGameState.numberedSquares.push({
                    index: squareIndex,
                    number: i
                });
            }
        }

        function displayNumberedPattern() {
            $('.numbered-sequence-square').removeClass('lit').text('');
            numberedSequenceGameState.numberedSquares.forEach(item => {
                const square = $(`.numbered-sequence-square[data-index="${item.index}"]`);
                square.addClass('lit').text(item.number);
            });
        }

        function updateNumberedSequenceTimer(timeMs) {
            const safeTimeMs = Math.max(0, timeMs);
            const progress = Math.max(0, safeTimeMs / numberedSequenceGameState.activeTimerDuration) * 100;
            $('.numbered-sequence-timer-progress').css('width', `${progress}%`);
            $('#numbered-sequence-timer').text((safeTimeMs / 1000).toFixed(1));
        }

        function hideNumbersStartGame() {
            numberedSequenceGameState.showingPattern = false;
            numberedSequenceGameState.gameActive = true;
            
            $('.numbered-sequence-square').removeClass('lit').text('');
            $('#numbered-sequence-message').text(`Click the squares in numerical order (1-${numberedSequenceGameState.config.sequenceLength})`);
            
            if (numberedSequenceGameState.timerInterval) {
                clearInterval(numberedSequenceGameState.timerInterval);
                numberedSequenceGameState.timerInterval = null;
            }
            
            $('.numbered-sequence-timer-progress').css('width', '0%');
            $('#numbered-sequence-timer').text('0.0');
            startGuessTimer();
        }

        function startGuessTimer() {
            let remainingTime = numberedSequenceGameState.config.guessTime;
            numberedSequenceGameState.activeTimerDuration = numberedSequenceGameState.config.guessTime;
            updateGuessTimer(remainingTime);
            
            numberedSequenceGameState.guessTimer = setTimeout(() => {
                if (numberedSequenceGameState.gameActive) {
                    if (numberedSequenceGameState.timerInterval) {
                        clearInterval(numberedSequenceGameState.timerInterval);
                        numberedSequenceGameState.timerInterval = null;
                    }
                    
                    numberedSequenceGameState.gameActive = false;
                    numberedSequenceGameState.showingPattern = false;
                    $('#numbered-sequence-message').text('Time\'s up! Game failed.');
                    playNumberedSequenceSound('failure');
                    setTimeout(() => {
                        endNumberedSequenceGame(false);
                    }, 1500);
                }
            }, numberedSequenceGameState.config.guessTime);
            
            numberedSequenceGameState.timerInterval = setInterval(() => {
                remainingTime -= 100;
                if (remainingTime < 0) remainingTime = 0;
                updateGuessTimer(remainingTime);
                if (remainingTime <= 0) {
                    clearInterval(numberedSequenceGameState.timerInterval);
                    numberedSequenceGameState.timerInterval = null;
                }
            }, 100);
        }

        function updateGuessTimer(timeMs) {
            const safeTimeMs = Math.max(0, timeMs);
            const progress = Math.max(0, safeTimeMs / numberedSequenceGameState.activeTimerDuration) * 100;
            $('.numbered-sequence-timer-progress').css('width', `${progress}%`);
            $('#numbered-sequence-timer').text((safeTimeMs / 1000).toFixed(1));
        }

        function handleNumberedSequenceSquareClick() {
            if (!numberedSequenceGameState.gameActive || numberedSequenceGameState.showingPattern) {
                return;
            }
            
            const squareIndex = parseInt($(this).attr('data-index'));
            const expectedSquare = numberedSequenceGameState.numberedSquares.find(
                item => item.number === numberedSequenceGameState.currentExpectedNumber
            );
            
            if (!expectedSquare) return;
            
            $(this).addClass('selected');
            
            if (squareIndex === expectedSquare.index) {
                playNumberedSequenceSound('click');
                $(this).addClass('correct').text(numberedSequenceGameState.currentExpectedNumber);
                numberedSequenceGameState.playerSequence.push(squareIndex);
                numberedSequenceGameState.currentExpectedNumber++;
                
                if (numberedSequenceGameState.currentExpectedNumber > numberedSequenceGameState.config.sequenceLength) {
                    if (numberedSequenceGameState.guessTimer) clearTimeout(numberedSequenceGameState.guessTimer);
                    if (numberedSequenceGameState.timerInterval) clearInterval(numberedSequenceGameState.timerInterval);
                    
                    numberedSequenceGameState.currentRound++;
                    numberedSequenceGameState.gameActive = false;
                    $('#numbered-sequence-message').text('Sequence completed correctly!');
                    
                    if (numberedSequenceGameState.currentRound >= numberedSequenceGameState.config.rounds) {
                        setTimeout(() => { endNumberedSequenceGame(true); }, 1500);
                    } else {
                        setTimeout(() => { startNumberedSequenceRound(); }, 2000);
                    }
                }
            } else {
                $(this).addClass('wrong');
                numberedSequenceGameState.wrongPresses++;
                playNumberedSequenceSound('penalty');
                
                $('#numbered-sequence-message').text(`Wrong square! Expected number ${numberedSequenceGameState.currentExpectedNumber} (${numberedSequenceGameState.wrongPresses}/${numberedSequenceGameState.config.maxWrongPresses})`);
                
                if (numberedSequenceGameState.wrongPresses >= numberedSequenceGameState.config.maxWrongPresses) {
                    if (numberedSequenceGameState.guessTimer) clearTimeout(numberedSequenceGameState.guessTimer);
                    if (numberedSequenceGameState.timerInterval) clearInterval(numberedSequenceGameState.timerInterval);
                    
                    numberedSequenceGameState.gameActive = false;
                    numberedSequenceGameState.showingPattern = false;
                    $('#numbered-sequence-message').text('Too many wrong presses! Game failed.');
                    playNumberedSequenceSound('failure');
                    setTimeout(() => { endNumberedSequenceGame(false); }, 1500);
                    return;
                }
                
                setTimeout(() => {
                    if (!numberedSequenceGameState.gameStarted || numberedSequenceGameState.wrongPresses >= numberedSequenceGameState.config.maxWrongPresses) return;
                    if (numberedSequenceGameState.guessTimer) clearTimeout(numberedSequenceGameState.guessTimer);
                    if (numberedSequenceGameState.timerInterval) clearInterval(numberedSequenceGameState.timerInterval);
                    
                    $('.numbered-sequence-square').removeClass('selected correct wrong').text('');
                    numberedSequenceGameState.playerSequence = [];
                    numberedSequenceGameState.currentExpectedNumber = 1;
                    numberedSequenceGameState.gameActive = false;
                    
                    setTimeout(() => {
                        if (numberedSequenceGameState.gameStarted && numberedSequenceGameState.wrongPresses < numberedSequenceGameState.config.maxWrongPresses) {
                            restartCurrentRound();
                        }
                    }, 500);
                }, 1000);
            }
        }

        function endNumberedSequenceGame(success) {
            if (!numberedSequenceGameState.gameStarted) return;
            
            numberedSequenceGameState.gameActive = false;
            numberedSequenceGameState.showingPattern = false;
            numberedSequenceGameState.gameStarted = false;
            
            clearAllGameTimers();
            
            if (success) {
                $('#numbered-sequence-message').text('Numbered sequence test completed successfully!');
                playNumberedSequenceSound('success');
            } else {
                const currentMessage = $('#numbered-sequence-message').text();
                if (!currentMessage.includes('failed') && !currentMessage.includes('Time\'s up')) {
                    $('#numbered-sequence-message').text('Numbered sequence test failed!');
                    playNumberedSequenceSound('failure');
                }
            }
            
            setTimeout(() => {
                $('#numbered-sequence-message').text(success ? "🏆 MATRIX BREACH SUCCESSFUL!" : "❌ FIREWALL LOCKED DOWN!");
                
                setTimeout(() => {
                    $('.minigame-gameplay-elements').hide();
                    $('#settings-panel').fadeIn(200);
                }, 2000);
            }, 2000);
        }

        function playNumberedSequenceSound(type) {
            // Example implementation to play the sounds:
            const audioEl = document.getElementById(`sound-${type}`);
            if (audioEl) {
                audioEl.currentTime = 0; // Rewind to start
                audioEl.play().catch(err => console.log("Audio playback deferred:", err));
            }
        }

        // --- LOAD LOGIC FLOW ---
        $(window).on('load', function() {
            $('#settings-panel').show();
            $('.minigame-gameplay-elements').hide();

            $('input[type="range"]').on('input', function() {
                const inputId = $(this).attr('id');
                const targetId = inputId.replace('setting-', 'val-');
                $(`#${targetId}`).text($(this).val());
            });

            $('#save-settings-btn').on('click', function() {
                const gSize = parseInt($('#setting-grid-size').val()) || 4;
                const maxCells = gSize * gSize;
                let seqLen = parseInt($('#setting-seq-len').val());
                
                if(seqLen > maxCells) {
                    alert(`Sequence length capped to max ${maxCells} for standard layout constraints.`);
                    seqLen = maxCells;
                    $('#setting-seq-len').val(maxCells);
                    $('#val-seq-len').text(maxCells);
                }

                const updatedConfig = {
                    gridSize: gSize,
                    sequenceLength: seqLen,
                    rounds: parseInt($('#setting-rounds').val()),
                    maxWrongPresses: parseInt($('#setting-max-wrong').val()),
                    showTime: parseFloat($('#setting-show-time').val()) * 1000,
                    guessTime: parseFloat($('#setting-guess-time').val()) * 1000
                };

                $('#settings-panel').hide();
                $('.minigame-gameplay-elements').css('display', 'flex').show();
                startNumberedSequenceGame(updatedConfig);
            });
        });
    </script>
</body>
</html>
